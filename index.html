<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vis 💕</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  text-align: center;
  color: #333;
  overflow: hidden;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease;
  width: 90%;
  max-width: 500px;
}

h1 { font-size: 40px; }
p { font-size: 18px; }

img {
  width: 260px;
  border-radius: 25px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

img:hover {
  transform: scale(1.05);
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#startBtn {
  background: #ff4d88;
  color: white;
}

#yes {
  background: #ff4d88;
  color: white;
}

#no {
  background: white;
  position: absolute;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translate(-50%, -60%);}
  to {opacity: 1; transform: translate(-50%, -50%);}
}
</style>
</head>

<body>

<!-- 🎵 MUSIC (PUT YOUR LINK BELOW) -->
<audio autoplay loop>
  <source src="YOUR_SONG_LINK_HERE" type="audio/mp3">
</audio>

<div class="container" id="main">
  <h1>Hey Vis 💕</h1>
  <p>I made something for you…</p>

  <!-- 🖼 YOUR IMAGE -->
  <img src="https://imgur.com/a/MFae7o1">

  <br><br>
  <button id="startBtn" onclick="start()">Click me 😳</button>
</div>

<script>
function start() {
  document.body.innerHTML = `
    <div class="container">
      <h1>Be honest… 💭</h1>
      <h2>Do you like me?</h2>
      <button id="yes" onclick="yes()">Yes 😍</button>
      <button id="no" onmouseover="moveNo()">No 🙄</button>
    </div>
  `;
}

function moveNo() {
  let btn = document.getElementById("no");
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

function yes() {
  document.body.innerHTML = `
    <div class="container">
      <h1>Vis 💖</h1>
      <h2>I’ve been listening to "Blessed"</h2>
      <p>and thinking about you...</p>

      <h1 style="margin-top:25px;">Will you be my girlfriend? 🥺</h1>

      <p style="margin-top:25px;">
      vis, thank you for everything you do for me and for always being there for me. <br><br>
      i really love you, my baby. <br><br>
      i just want you to be happy every time you’re with me. <br><br>
      you make my days so much better, and i hope you always keep that smile of yours because it’s irreplaceable. <br><br>
      and yeah… my bike might still hit you 😭 but i’ll always be there for you. <br><br>
      i’m never leaving you. ❤️
      </p>
    </div>
  `;
}
</script>

</body>
</html>
