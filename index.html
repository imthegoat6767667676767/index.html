<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: pink;
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d88;
      color: white;
    }

    #no {
      background: white;
      position: absolute;
    }
  </style>
</head>

<body>

<h1 id="text">Hey… I have a question 😳</h1>

<button onclick="nextStep()">Click me</button>

<div id="buttons" style="display:none;">
  <h1>Do you like me? 💖</h1>
  <button id="yes" onclick="yes()">Yes 😍</button>
  <button id="no" onmouseover="moveNo()">No 🙄</button>
</div>

<script>
function nextStep() {
  document.querySelector("button").style.display = "none";
  document.getElementById("text").style.display = "none";
  document.getElementById("buttons").style.display = "block";
}

function moveNo() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  let noBtn = document.getElementById("no");

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function yes() {
  document.body.innerHTML = "<h1>Will you be my girlfriend? 💕</h1><h2>🥺👉👈</h2>";
}
</script>

</body>
</html>
