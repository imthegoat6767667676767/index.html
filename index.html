<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.card {
  width: 92%;
  max-width: 520px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  text-align: center;
  position: absolute;
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: 0.5s ease;
}

.card.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

h1 { font-size: 32px; }
h2 { font-size: 22px; font-weight: 400; }
p  { font-size: 16px; }

img {
  width: 240px;
  border-radius: 18px;
  margin-top: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  padding: 12px 26px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  margin: 10px;
  cursor: pointer;
  transition: 0.25s ease;
}

button:hover {
  transform: scale(1.05);
}

.primary {
  background: #ff4d88;
  color: white;
}

.secondary {
  background: white;
  color: #333;
  position: fixed;
}

/* hearts */
.heart {
  position: fixed;
  font-size: 18px;
  animation: floatUp 3.5s linear forwards;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="card active" id="s1">
  <h1>Hey Vis</h1>
  <p>I made something for you.</p>

  <img src="YOUR_DIRECT_IMAGE_LINK.jpg">

  <br>
  <button class="primary" onclick="next()">Start</button>
</div>

<!-- SCREEN 2 -->
<div class="card" id="s2">
  <h1>Be honest</h1>
  <h2>Do you like me?</h2>

  <button class="primary" onclick="yes()">Yes</button>
  <button class="secondary" id="noBtn">No</button>
</div>

<!-- SCREEN 3 -->
<div class="card" id="s3">
  <h1>That made me happy</h1>
  <p>I really appreciate you.</p>

  <button class="primary" onclick="finalAsk()">Continue</button>
</div>

<!-- SCREEN 4 -->
<div class="card" id="s4">
  <h1>One last thing</h1>
  <h2>May I be your boyfriend?</h2>

  <button class="primary" onclick="finalYes()">Yes 💕</button>
  <button class="secondary" id="noBtn2">No</button>
</div>

<!-- FINAL -->
<div class="card" id="s5">
  <h1>💖</h1>
  <p>
    thank you for making me happy.<br><br>
    you mean a lot to me.
  </p>
</div>

<script>

function show(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* FLOW */
function next() {
  show("s2");
}

/* NO RUNAWAY (SCREEN 2) */
const noBtn = document.getElementById("noBtn");

document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();
  const dx = rect.x - e.clientX;
  const dy = rect.y - e.clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 120) {
    noBtn.style.left = rect.x + (dx / dist) * 50 + "px";
    noBtn.style.top = rect.y + (dy / dist) * 50 + "px";
  }
});

/* YES */
function yes() {
  show("s3");
}

/* CONTINUE */
function finalAsk() {
  show("s4");
}

/* NO 2 */
const noBtn2 = document.getElementById("noBtn2");

document.addEventListener("mousemove", (e) => {
  const rect = noBtn2.getBoundingClientRect();
  const dx = rect.x - e.clientX;
  const dy = rect.y - e.clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 120 && document.getElementById("s4").classList.contains("active")) {
    noBtn2.style.left = rect.x + (dx / dist) * 50 + "px";
    noBtn2.style.top = rect.y + (dy / dist) * 50 + "px";
  }
});

/* FINAL YES */
function finalYes() {
  show("s5");
  hearts();
}

/* HEARTS */
function hearts() {
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "💖";

      h.style.left = Math.random() * 100 + "vw";
      h.style.top = "80vh";

      document.body.appendChild(h);
      setTimeout(() => h.remove(), 3500);
    }, i * 40);
  }
}

</script>

</body>
</html>
</html>
