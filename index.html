<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vis 💕</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  color: #333;
  text-align: center;
  overflow: hidden;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 42px;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

img {
  width: 260px;
  border-radius: 25px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

img:hover {
  transform: scale(1.05);
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#startBtn {
  background: #ff4d88;
  color: white;
}

#startBtn:hover {
  background: #ff1a66;
  transform: scale(1.1);
}

#yes {
  background: #ff4d88;
  color: white;
}

#yes:hover {
  transform: scale(1.1);
}

#no {
  background: white;
  position: absolute;
}

.final {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translate(-50%, -60%);}
  to {opacity: 1; transform: translate(-50%, -50%);}
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1>Hey Vis 💕</h1>
  <p>I made something for you…</p>

  <!-- PUT YOUR IMAGE LINK HERE -->
  <img src="YOUR_IMAGE_LINK_HERE">

  <br><br>
  <button id="startBtn" onclick="start()">Click me 😳</button>
</div>

<script>
function start() {
  document.body.innerHTML = `
    <div class="container">
      <h1>Be honest… 💭</h1>
      <h2>Do you like me?</h2>
      <button id="yes" onclick="yes()">Yes 😍</button>
      <button id="no" onmouseover="moveNo()">No 🙄</button>
    </div>
  `;
}

function moveNo() {
  let btn = document.getElementById("no");
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

function yes() {
  document.body.innerHTML = `
    <div class="container final">
      <h1>Vis 💖</h1>
      <h2>I’ve been listening to "Blessed"</h2>
      <p>and thinking about you...</p>
      <h1 style="margin-top:30px;">Will you be my girlfriend? 🥺</h1>
      <p>(you don’t really have a choice 😭)</p>
    </div>
  `;
}
</script>

</body>
</html>
